<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Liberté 45 — Bonne fête Mélanie!</title>
  <meta property="og:title" content="Liberté 45">
  <meta property="og:description" content="Une surprise pour tes 45 ans 🥂">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0e0e12; -webkit-text-size-adjust: 100%; }
    body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

    #app { width: 100%; height: 100%; height: 100dvh; display: flex; justify-content: center; align-items: center; }

    #container {
      width: 100%; max-width: 430px; height: 100%; height: 100dvh;
      position: relative; overflow: hidden; display: flex; flex-direction: column;
      user-select: none; -webkit-user-select: none; touch-action: pan-y;
    }

    /* --- Content --- */
    #content {
      position: relative; z-index: 2;
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 48px 24px 100px; text-align: center;
      overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    #content::-webkit-scrollbar { display: none; }

    .label {
      font-size: 13px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
      padding: 5px 16px; border-radius: 20px; margin-bottom: 24px; opacity: 0.85;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    .emoji { font-size: 52px; line-height: 1; margin-bottom: 20px; }
    .emoji.intro { font-size: 48px; margin-bottom: 12px; }
    .emoji.last { animation: heartbeat 1.8s ease-in-out infinite; }

    .big-number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(72px, 20vw, 110px); font-weight: 900;
      line-height: 0.85; margin-bottom: 2px; letter-spacing: -2px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 7vw, 34px); font-weight: 700; line-height: 1.2; margin-bottom: 6px;
    }
    .card-title.intro { font-size: clamp(26px, 7vw, 36px); letter-spacing: 1px; }

    .card-subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 19px; font-weight: 400; font-style: italic; margin-bottom: 24px; opacity: 0.8;
    }

    .divider { width: 40px; height: 2px; opacity: 0.35; margin: 16px 0 20px; border-radius: 1px; }

    .message {
      font-size: 17px; line-height: 1.75; opacity: 0.92;
      white-space: pre-line; max-width: 320px; font-weight: 400;
    }

    .wish {
      font-family: 'Playfair Display', serif;
      font-size: 19px; font-weight: 700; font-style: italic; margin-top: 24px; opacity: 0.9;
    }
    .wish.last { font-size: 24px; opacity: 1; }

    /* --- Swipe indicator (intro only) --- */
    .swipe-indicator {
      margin-top: 36px; display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .swipe-badge {
      font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
      opacity: 0.6;
    }
    .swipe-cta {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600; letter-spacing: 0.5px;
      padding: 10px 28px; border-radius: 30px; opacity: 0.85;
      animation: swipe-pulse 2.5s ease-in-out infinite;
    }
    .swipe-cta .arrow {
      display: inline-block; font-size: 20px; font-weight: 700;
      animation: swipe-bounce 1.5s ease-in-out infinite;
    }

    /* --- Navigation --- */
    #nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 24px 28px; display: flex; justify-content: center; align-items: center; gap: 14px; z-index: 10;
    }
    .nav-arrow {
      background: none; border: none; font-size: 20px; padding: 10px;
      line-height: 1; cursor: pointer; transition: opacity 0.3s;
    }
    .nav-arrow:disabled { cursor: default; }
    .nav-arrow:focus-visible { outline: 2px solid rgba(255,255,255,0.5); outline-offset: 2px; border-radius: 4px; }
    #dots { display: flex; gap: 7px; align-items: center; }
    .dot {
      height: 7px; border-radius: 4px; border: none; padding: 0;
      cursor: pointer; transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .dot:focus-visible { outline: 2px solid rgba(255,255,255,0.5); outline-offset: 2px; }

    /* --- Mute button --- */
    #mute-btn {
      position: absolute; top: 16px; right: 16px; z-index: 20;
      background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: none; border-radius: 50%; width: 40px; height: 40px;
      font-size: 18px; line-height: 40px; text-align: center;
      cursor: pointer; opacity: 0; transition: opacity 0.5s;
    }
    #mute-btn.visible { opacity: 0.7; }
    #mute-btn:hover { opacity: 1; }

    /* --- Confetti --- */
    #confetti { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 5; }
    .confetti-piece { position: absolute; top: -12px; opacity: 0.85; }

    /* --- Animations --- */
    @keyframes card-in {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes swipe-pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.03); }
    }
    @keyframes swipe-bounce {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(5px); }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15%      { transform: scale(1.12); }
      30%      { transform: scale(1); }
      45%      { transform: scale(1.08); }
      60%      { transform: scale(1); }
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) translateX(0) rotate(var(--rot0)); opacity: 0.9; }
      100% { transform: translateY(105vh) translateX(var(--drift)) rotate(calc(var(--rot0) + 720deg)); opacity: 0; }
    }

    /* --- Background animations --- */
    #bg-anim { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 1; }

    .bg-star { position: absolute; border-radius: 50%; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.6); }
    }

    .bg-sun { position: absolute; top: -60px; right: -60px; width: 260px; height: 260px; border-radius: 50%; }
    @keyframes sun-pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.18); opacity: 0.8; }
    }

    .bg-snow { position: absolute; border-radius: 50%; background: white; }
    @keyframes snow-fall {
      0% { transform: translateY(0) translateX(0); opacity: 0.6; }
      100% { transform: translateY(110vh) translateX(var(--drift)); opacity: 0; }
    }

    .bg-bar { position: absolute; bottom: 0; border-radius: 6px 6px 0 0; transform-origin: bottom; }
    @keyframes bar-grow {
      0% { transform: scaleY(0); opacity: 0; }
      60% { opacity: 1; }
      100% { transform: scaleY(1); opacity: 1; }
    }

    .bg-bubble { position: absolute; border-radius: 50%; }
    @keyframes bubble-rise {
      0% { transform: translateY(0) scale(1); opacity: 0.4; }
      80% { opacity: 0.2; }
      100% { transform: translateY(-110vh) scale(0.6); opacity: 0; }
    }

    .bg-cell { position: absolute; border-radius: 50%; }
    @keyframes cell-drift {
      0%, 100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(var(--dx), var(--dy)) scale(1.08); }
      50% { transform: translate(calc(var(--dx)*-0.6), calc(var(--dy)*1.3)) scale(0.95); }
      75% { transform: translate(calc(var(--dx)*0.4), calc(var(--dy)*-0.5)) scale(1.03); }
    }

    .bg-heart { position: absolute; }
    @keyframes heart-rise {
      0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.35; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-110vh) scale(0.6) rotate(var(--rot)); opacity: 0; }
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      #nav { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
      #mute-btn { top: calc(16px + env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>

        <button class="nav-arrow" id="btn-prev" aria-label="Précédent">‹</button>
        <div id="dots"></div>

      </nav>
      <button id="mute-btn" aria-label="Couper le son">🔊</button>

  </div>

<script>
// ============================================================
//  Card data
// ============================================================
const CARDS = [

    wish: 'Bonne fête, Mélanie version 5 à 7! 🍻',
    colors: {

  {

    message: "30 ans d'amitié.\n\nT'es probablement la seule personne au monde à qui je parle encore au téléphone. Comme dans le temps.\n\nPis c'est toujours aussi plaisant de te voir rire.\n\nToutes les Mélanie sont exceptionnelles.\nMais celle-là... c'est ma préférée.",
    wish: 'Bonne fête, Mél. ❤️',
    isLast: true,
    colors: {
      bg:       'linear-gradient(150deg, #881337 0%, #be123c 40%, #e86833 100%)',
      accent:   '#ffffff',

// ============================================================
//  Music — "Bonne fête" music box melody
// ============================================================
let audioCtx  = null;
let masterGain = null;
let musicStarted = false;
let isMuted = false;

// Melody: [frequency, duration_in_beats]  (0 = rest)
const MELODY = [
  [261.63,0.75],[261.63,0.25],[293.66,1],[261.63,1],[349.23,1],[329.63,1.5],[0,0.5],
  [261.63,0.75],[261.63,0.25],[293.66,1],[261.63,1],[392.00,1],[349.23,1.5],[0,0.5],
  [261.63,0.75],[261.63,0.25],[523.25,1],[440.00,1],[349.23,1],[329.63,1],[293.66,1.5],[0,0.5],
  [466.16,0.75],[466.16,0.25],[440.00,1],[349.23,1],[392.00,1],[349.23,2]
];

// Bass roots: [freq, start_beat, dur_beats]
const BASS = [
  [130.81,0,5.5],[130.81,6,3],[196.00,9,3],
  [130.81,12,3],[174.61,15,4],
  [233.08,19,2],[174.61,21,1],[130.81,22,3]
];

// Chord pads (quiet mid-range): [freqs[], start_beat, dur_beats]
const CHORDS = [
  [[329.63,392.00],0,3],[[349.23,440.00],3,2.5],
  [[329.63,392.00],6,3],[[293.66,392.00],9,1.5],[[349.23,440.00],10.5,1.5],
  [[329.63,392.00],12,3],[[349.23,440.00],15,2],[[293.66,392.00],17,2],
  [[349.23,466.16],19,2],[[329.63,392.00],22,3]
];

function playMelodyNote(freq, time, dur) {
  // Main voice — triangle, music box character
  var osc = audioCtx.createOscillator();
  var g   = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(0.13, time + 0.012);
  g.gain.setValueAtTime(0.09, time + dur * 0.3);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.92);
  osc.connect(g); g.connect(masterGain);
  osc.start(time); osc.stop(time + dur);

  // Shimmer — sine, octave up, delicate
  var o2 = audioCtx.createOscillator();
  var g2 = audioCtx.createGain();
  o2.type = 'sine';
  o2.frequency.value = freq * 2;
  g2.gain.setValueAtTime(0, time);
  g2.gain.linearRampToValueAtTime(0.035, time + 0.02);
  g2.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.7);
  o2.connect(g2); g2.connect(masterGain);
  o2.start(time); o2.stop(time + dur);
}

function playBassNote(freq, time, dur) {
  var osc = audioCtx.createOscillator();
  var g   = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(0.05, time + 0.06);
  g.gain.setValueAtTime(0.04, time + dur * 0.5);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.95);
  osc.connect(g); g.connect(masterGain);
  osc.start(time); osc.stop(time + dur);

  // Soft fifth above for warmth
  var o2 = audioCtx.createOscillator();
  var g2 = audioCtx.createGain();
  o2.type = 'sine';
  o2.frequency.value = freq * 1.5;
  g2.gain.setValueAtTime(0, time);
  g2.gain.linearRampToValueAtTime(0.025, time + 0.08);
  g2.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.85);
  o2.connect(g2); g2.connect(masterGain);
  o2.start(time); o2.stop(time + dur);
}

function playChord(freqs, time, dur) {
  freqs.forEach(function(freq) {
    var osc = audioCtx.createOscillator();
    var g   = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(0.025, time + 0.08);
    g.gain.setValueAtTime(0.02, time + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.95);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + dur);
  });
}

function ensureAudio() {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = isMuted ? 0 : 1;
      masterGain.connect(audioCtx.destination);
    }
    // Silent buffer trick — forces iOS/Android to unlock audio
    var buf = audioCtx.createBuffer(1, 1, 22050);
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
}

function scheduleNotes() {
  var tempo = 100;
  var beat  = 60 / tempo;
  var t0    = audioCtx.currentTime + 0.15;
  var t     = t0;

  MELODY.forEach(function(note) {
    var freq = note[0], dur = note[1] * beat;
    if (freq > 0) playMelodyNote(freq, t, dur);
    t += dur;
  });

  BASS.forEach(function(b) {
    playBassNote(b[0], t0 + b[1] * beat, b[2] * beat);
  });

  CHORDS.forEach(function(ch) {
    playChord(ch[0], t0 + ch[1] * beat, ch[2] * beat);
  });

  document.getElementById('mute-btn').classList.add('visible');
}

function startMusic() {
  if (musicStarted) return;

  try {
    ensureAudio();
    if (!audioCtx) return;

    if (audioCtx.state === 'running') {
      // Context ready — schedule immediately
      musicStarted = true;
      scheduleNotes();
    } else {
      // Context still waking up — wait for it, then schedule
      audioCtx.resume();
      audioCtx.onstatechange = function() {
        if (audioCtx.state === 'running' && !musicStarted) {
          musicStarted = true;
          scheduleNotes();
          audioCtx.onstatechange = null;
        }
      };
    }
  } catch(e) {}
}

function toggleMute() {
  isMuted = !isMuted;
  if (masterGain) masterGain.gain.value = isMuted ? 0 : 1;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
}

document.getElementById('mute-btn').addEventListener('click', function(e) {
  e.stopPropagation();
  toggleMute();
});

// ============================================================
//  State & DOM refs
// ============================================================
var current = 0;
var container  = document.getElementById('container');
var contentEl  = document.getElementById('content');
var dotsEl     = document.getElementById('dots');
var confettiEl = document.getElementById('confetti');
var btnPrev    = document.getElementById('btn-prev');
var btnNext    = document.getElementById('btn-next');
var themeMeta  = document.querySelector('meta[name="theme-color"]');
var bgAnimEl   = document.getElementById('bg-anim');

// ============================================================
//  Background animations
// ============================================================
function renderBgAnim(card) {
  bgAnimEl.innerHTML = '';
  var c = card.colors;
  switch(card.id) {
    case 'intro':      animStars(c); break;
    case 'summer':     animSun(c); break;
    case 'winter':     animSnow(c); break;
    case 'investor':   animBars(c); break;
    case 'festive':    animBubbles(c); break;
    case 'biologist':  animCells(c); break;
    case 'bestfriend': break; // confetti only
  }
}

function animStars(c) {
  for (var i = 0; i < 22; i++) {
    var d = document.createElement('div');
    d.className = 'bg-star';
    var s = Math.random()*3+2;
    d.style.cssText = 'left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+s+'px;height:'+s+'px;background:'+c.accent+';animation:twinkle '+(Math.random()*3+2).toFixed(1)+'s '+(Math.random()*4).toFixed(1)+'s ease-in-out infinite';
    bgAnimEl.appendChild(d);
  }
}

function animSun(c) {
  // SVG sun silhouette (like the mountain in winter)
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 430 430');
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.style.cssText = 'position:absolute;top:-40px;right:-60px;width:320px;height:320px;opacity:0.08';
  // Core circle
  var circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx','215'); circle.setAttribute('cy','215'); circle.setAttribute('r','90');
  circle.setAttribute('fill','white');
  svg.appendChild(circle);
  // 12 triangular rays
  var rays = '';
  for (var i = 0; i < 12; i++) {
    var a = i*30*Math.PI/180, ha = 10*Math.PI/180;
    var x1 = 215+100*Math.cos(a-ha), y1 = 215+100*Math.sin(a-ha);
    var x2 = 215+160*Math.cos(a),    y2 = 215+160*Math.sin(a);
    var x3 = 215+100*Math.cos(a+ha), y3 = 215+100*Math.sin(a+ha);
    rays += 'M'+x1.toFixed(1)+','+y1.toFixed(1)+' L'+x2.toFixed(1)+','+y2.toFixed(1)+' L'+x3.toFixed(1)+','+y3.toFixed(1)+' Z ';
  }
  var rp = document.createElementNS('http://www.w3.org/2000/svg','path');
  rp.setAttribute('d',rays); rp.setAttribute('fill','white');
  svg.appendChild(rp);
  bgAnimEl.appendChild(svg);

  // Animated glow overlay
  var d = document.createElement('div');
  d.className = 'bg-sun';
  d.style.cssText = 'top:-80px;right:-80px;width:340px;height:340px';
  d.style.background = 'radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,230,100,0.25) 35%, rgba(255,180,50,0.1) 55%, transparent 70%)';
  d.style.animation = 'sun-pulse 4s ease-in-out infinite';
  bgAnimEl.appendChild(d);
  // Rays
  for (var i = 0; i < 8; i++) {
    var r = document.createElement('div');
    var angle = i * 45;
    r.style.cssText = 'position:absolute;top:30px;right:50px;width:3px;height:120px;background:rgba(255,255,255,0.12);border-radius:2px;transform-origin:center 120px;transform:rotate('+angle+'deg);animation:sun-pulse 4s '+(i*0.2)+'s ease-in-out infinite';
    bgAnimEl.appendChild(r);
  }
  // Warm glow at bottom
  var g = document.createElement('div');
  g.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top, rgba(255,180,50,0.06), transparent);pointer-events:none';
  bgAnimEl.appendChild(g);
}

function animSnow(c) {
  // Mountain silhouette
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 430 180');
  svg.setAttribute('preserveAspectRatio','none');
  svg.style.cssText = 'position:absolute;bottom:0;left:0;width:100%;height:180px;opacity:0.07';
  var path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d','M0,180 L70,90 L110,130 L190,30 L250,100 L310,50 L380,110 L430,70 L430,180 Z');
  path.setAttribute('fill', c.accent);
  svg.appendChild(path);
  bgAnimEl.appendChild(svg);
  // Snowflakes
  for (var i = 0; i < 25; i++) {
    var d = document.createElement('div');
    d.className = 'bg-snow';
    var s = Math.random()*4+2;
    d.style.cssText = 'left:'+Math.random()*100+'%;top:-10px;width:'+s+'px;height:'+s+'px;opacity:0.5';
    d.style.setProperty('--drift',(Math.random()-0.5)*60+'px');
    d.style.animation = 'snow-fall '+(Math.random()*4+3).toFixed(1)+'s '+(Math.random()*5).toFixed(1)+'s linear infinite';
    bgAnimEl.appendChild(d);
  }
}

function animBars(c) {
  var n = 8;
  var w = 28;
  var gap = 14;
  var totalW = n*w + (n-1)*gap;
  var startX = (430 - totalW) / 2;
  for (var i = 0; i < n; i++) {
    var d = document.createElement('div');
    d.className = 'bg-bar';
    var h = 60 + i*22 + Math.random()*15;
    d.style.cssText = 'left:'+(startX+i*(w+gap))+'px;width:'+w+'px;height:'+h+'px;background:'+c.accent+';opacity:0.12;animation:bar-grow 1.2s '+(i*0.12).toFixed(2)+'s cubic-bezier(0.22,1,0.36,1) both';
    bgAnimEl.appendChild(d);
  }
}

function animBubbles(c) {
  for (var i = 0; i < 24; i++) {
    var d = document.createElement('div');
    d.className = 'bg-bubble';
    var s = Math.random()*18+8;
    d.style.cssText = 'left:'+Math.random()*90+'%;bottom:-20px;width:'+s+'px;height:'+s+'px;border:1.5px solid rgba(252,228,168,0.35);background:rgba(252,228,168,0.08);animation:bubble-rise '+(Math.random()*4+3).toFixed(1)+'s '+(Math.random()*5).toFixed(1)+'s linear infinite';
    bgAnimEl.appendChild(d);
  }
}

function animCells(c) {
  for (var i = 0; i < 12; i++) {
    var d = document.createElement('div');
    d.className = 'bg-cell';
    var s = Math.random()*50+20;
    d.style.cssText = 'left:'+Math.random()*85+'%;top:'+Math.random()*85+'%;width:'+s+'px;height:'+s+'px;border:1.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06)';
    d.style.setProperty('--dx',(Math.random()-0.5)*50+'px');
    d.style.setProperty('--dy',(Math.random()-0.5)*50+'px');
    d.style.animation = 'cell-drift '+(Math.random()*5+5).toFixed(1)+'s '+(Math.random()*3).toFixed(1)+'s ease-in-out infinite';
    bgAnimEl.appendChild(d);
  }
}

function animHearts(c) {
  for (var i = 0; i < 12; i++) {
    var d = document.createElement('div');
    d.className = 'bg-heart';
    var s = Math.random()*10+10;
    d.style.cssText = 'left:'+Math.random()*90+'%;bottom:-20px;font-size:'+s+'px;line-height:1';
    d.style.setProperty('--rot',(Math.random()-0.5)*40+'deg');
    d.style.animation = 'heart-rise '+(Math.random()*4+4).toFixed(1)+'s '+(Math.random()*6).toFixed(1)+'s linear infinite';
    d.textContent = '❤';
    bgAnimEl.appendChild(d);
  }
}

// ============================================================
//  Render
// ============================================================
function render() {
  var card = CARDS[current];
  var c    = card.colors;

  container.style.background = c.bg;
  renderBgAnim(card);
  btnPrev.style.color   = c.text;
  btnPrev.style.opacity = current === 0 ? '0.15' : '0.6';
  btnPrev.disabled      = current === 0;
  btnNext.style.color   = c.text;
  btnNext.style.opacity = current === CARDS.length - 1 ? '0.15' : '0.6';
  btnNext.disabled      = current === CARDS.length - 1;
  if (themeMeta) themeMeta.content = c.theme || '#1a1a2e';

  var html = '';

  // Label badge
  if (card.label) {
    html += '<div class="label" style="background:'+c.labelBg+';color:'+c.text+'">'+card.label+'</div>';
  }

  // Emoji
  var eCls = 'emoji' + (card.emojiClass ? ' '+card.emojiClass : '') + (card.isLast ? ' last' : '');
  html += '<div class="'+eCls+'">'+card.emoji+'</div>';

  // Big 45
  if (card.showBigNumber) {
    html += '<div class="big-number" style="color:'+c.accent+'">45</div>';
  }

  // Title
  var tCls = 'card-title' + (card.titleClass ? ' '+card.titleClass : '');
  var tCol = card.showBigNumber ? c.accent : c.text;
  html += '<h1 class="'+tCls+'" style="color:'+tCol+'">'+card.title+'</h1>';

  // Subtitle
  if (card.subtitle) {
    html += '<p class="card-subtitle" style="color:'+c.accent+'">'+card.subtitle+'</p>';
  }

  // Divider
  html += '<div class="divider" style="background:'+(card.showBigNumber ? c.accent : c.text)+'"></div>';

  // Message
  html += '<p class="message" style="color:'+c.text+'">'+card.message+'</p>';

  // Wish
  if (card.wish) {
    html += '<p class="wish'+(card.isLast ? ' last' : '')+'" style="color:'+c.accent+'">'+card.wish+'</p>';
  }

  // Swipe indicator (intro only)
  if (card.isIntro) {
    html += '<div class="swipe-indicator">';
    html += '  <div class="swipe-badge" style="color:'+c.text+'">6 vies à découvrir</div>';
    html += '  <div class="swipe-cta" style="color:'+c.accent+';background:'+c.labelBg+'">';
    html += '    Glisse <span class="arrow">›</span>';
    html += '  </div>';
    html += '</div>';
  }

  contentEl.style.color = c.text;
  contentEl.innerHTML   = html;
  contentEl.style.animation = 'none';
  contentEl.offsetHeight;
  contentEl.style.animation = 'card-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) both';

  renderDots(c);

  if (card.isLast) showConfetti(); else hideConfetti();
}

function renderDots(c) {
  var html = '';
  for (var i = 0; i < CARDS.length; i++) {
    var w  = i === current ? '22px' : '7px';
    var op = i === current ? '0.85' : '0.25';
    html += '<button class="dot" data-i="'+i+'" style="width:'+w+';background:'+c.text+';opacity:'+op+'" aria-label="Carte '+(i+1)+'"></button>';
  }
  dotsEl.innerHTML = html;
}

// ============================================================
//  Confetti
// ============================================================
var CONFETTI_COLORS = ['#e2b44f','#ff6b35','#74b9ff','#10b981','#e11d48','#8e44ad','#f59e0b','#ffffff'];

function showConfetti() {
  if (confettiEl.children.length > 0) return;
  for (var i = 0; i < 50; i++) {
    var el       = document.createElement('div');
    var isCircle = Math.random() > 0.5;
    var size     = Math.random() * 6 + 5;
    var w = isCircle ? size : (Math.random() * 4 + 3);
    var h = isCircle ? size : (Math.random() * 8 + 6);
    el.className      = 'confetti-piece';
    el.style.left     = (Math.random()*100)+'%';
    el.style.width    = w+'px';
    el.style.height   = h+'px';
    el.style.background   = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    el.style.borderRadius = isCircle ? '50%' : '2px';
    el.style.setProperty('--drift', ((Math.random()-0.5)*120).toFixed(1)+'px');
    el.style.setProperty('--rot0',  (Math.random()*360).toFixed(0)+'deg');
    el.style.animation = 'confetti-fall '+(Math.random()*2.5+2.5).toFixed(2)+'s '+(Math.random()*3).toFixed(2)+'s ease-in both infinite';
    confettiEl.appendChild(el);
  }
}

function hideConfetti() { confettiEl.innerHTML = ''; }

// ============================================================
//  Navigation
// ============================================================
function goTo(i) {
  if (i < 0 || i >= CARDS.length || i === current) return;
  if (!musicStarted) startMusic();
  current = i;
  render();
}

btnPrev.addEventListener('click', function() { ensureAudio(); goTo(current - 1); });
btnNext.addEventListener('click', function() { ensureAudio(); goTo(current + 1); });
dotsEl.addEventListener('click', function(e) {
  ensureAudio();
  var btn = e.target.closest('.dot');
  if (btn) goTo(parseInt(btn.dataset.i, 10));
});

// ============================================================
//  Touch / swipe
// ============================================================
var touchX = 0, touchY = 0;

container.addEventListener('touchstart', function(e) {
  ensureAudio();
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });

container.addEventListener('touchend', function(e) {
  ensureAudio();
  var dx = touchX - e.changedTouches[0].clientX;
  var dy = touchY - e.changedTouches[0].clientY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 45) {
    goTo(current + (dx > 0 ? 1 : -1));
  }
}, { passive: true });

// ============================================================
//  Keyboard
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft')                    { e.preventDefault(); goTo(current - 1); }
});

// ============================================================
//  Init
// ============================================================
render();
</script>
</body>
</html>
